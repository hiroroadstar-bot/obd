<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>OBD検査対象判定</title>
<style>
 :root {
  --bg:#f5f6f8; --card:#fff; --text:#101114; --muted:#666b73;
  --green:#087a34; --red:#b00020; --yellow:#b26a00; --border:#e8e8e8;
 }
 *{box-sizing:border-box}
 body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:var(--bg);color:var(--text)}
 .wrap{max-width:560px;margin:auto;padding:18px;padding-top:max(18px,env(safe-area-inset-top));}
 h1{font-size:25px;margin:12px 0 6px;letter-spacing:.02em}
 .sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
 .card{background:var(--card);border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 8px 26px #00000012}
 label{display:block;font-weight:700;margin-bottom:8px}
 input{width:100%;font-size:18px;border-radius:15px;border:1px solid #ccd0d5;padding:14px 13px;text-transform:uppercase;background:#fff}
 button{width:100%;margin-top:12px;border:0;background:#111;color:#fff;font-weight:800;font-size:17px;border-radius:15px;padding:14px;cursor:pointer}
 .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
 .tab{padding:10px;border-radius:999px;background:#eef0f3;text-align:center;font-weight:800;font-size:14px;cursor:pointer}
 .tab.active{background:#111;color:#fff}
 .resultTitle{font-size:22px;font-weight:900;margin:0 0 12px;line-height:1.35}
 .ok{color:var(--green)} .ng{color:var(--red)} .maybe{color:var(--yellow)} .warn{color:var(--yellow)}
 .box{border:1px solid var(--border);border-radius:16px;padding:12px;margin-top:10px;background:#fff}
 .notice{background:#fff7e6;border-color:#ffd17a}
 .danger{background:#fff5f7;border-color:#ffc4cf}
 .good{background:#f0fff5;border-color:#ace3bd}
 .kv{display:grid;grid-template-columns:112px 1fr;gap:8px;font-size:15px;border-bottom:1px solid #eee;padding:9px 0}
 .kv:last-child{border-bottom:0}
 .k{color:var(--muted)}
 .v{font-weight:700;word-break:break-all}
 .small{font-size:13px;color:var(--muted);line-height:1.65}
 .chips{margin-top:8px}
 .chip{display:inline-block;background:#f0f1f3;border-radius:999px;padding:5px 9px;margin:3px;font-size:13px;font-weight:700}
 .candidate{border:1px solid var(--border);border-radius:14px;padding:11px;margin-top:8px;background:#fff;cursor:pointer}
 .candidate:hover{background:#f7f8fa}
 .candidate b{font-size:16px}
 .footer{font-size:12px;color:#777;line-height:1.6;text-align:center;margin:18px 0}
</style>
</head>
<body>
<div class="wrap">
  <h1>OBD検査対象判定</h1>
  <div class="sub">型式でも車名でも検索できます。対象車型式一覧データはアプリ内蔵なので、一覧表は表示しません。</div>

  <div class="card">
    <div class="tabs">
      <div id="tabModel" class="tab active" onclick="setMode('model')">型式で判定</div>
      <div id="tabName" class="tab" onclick="setMode('name')">車名で検索</div>
    </div>

    <label id="inputLabel" for="query">型式</label>
    <input id="query" placeholder="例：6AA-ZWE214W" autocomplete="off" autocapitalize="characters">
    <button id="mainBtn" onclick="runSearch()">判定する</button>
  </div>

  <div id="result"></div>

  <div class="footer">
    内蔵データ：OBD検査対象車型式一覧 1517件<br>
    実際の検査要否は、車検証備考欄・OBD検査開始日・10か月ルールも確認してください。
  </div>
</div>

let mode = "model";

function zenkakuToHankaku(s){
  return (s||"").replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0));
}
function norm(s){
  return zenkakuToHankaku(s||"").toUpperCase().replace(/[－―ー–—]/g,"-").replace(/\s/g,"").trim();
}
function compact(s){ return norm(s).replace(/-/g,""); }
function kata(s){ return norm(s).replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0x60)); }
function modelCore(s){
  const n = norm(s);
  const parts = n.split("-");
  return parts.length > 1 ? parts.slice(1).join("-") : n;
}
function alphaPrefix(s){
  const m = modelCore(s).match(/^[A-Z]{3,}/);
  return m ? m[0] : "";
}
function threeCharRelated(q,item){
  const qc = modelCore(q);
  const ic = modelCore(item.model);
  const qPrefix = alphaPrefix(q);
  const iPrefix = alphaPrefix(item.model);
  if(qPrefix.length >= 3 && iPrefix.length >= 3 && qPrefix === iPrefix) return qPrefix;
  for(let i=0;i<=qc.length-3;i++){
    const sub = qc.slice(i,i+3);
    if(/^[A-Z0-9]{3}$/.test(sub) && ic.includes(sub)) return sub;
  }
  return "";
}
function levenshtein(a,b){
  const dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));
  for(let i=0;i<=a.length;i++)dp[i][0]=i;
  for(let j=0;j<=b.length;j++)dp[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++){
    dp[i][j]=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  }
  return dp[a.length][b.length];
}
function scoreModel(q, item){
  const nq=norm(q), cq=compact(q), coreq=modelCore(q);
  const m=norm(item.model), cm=compact(item.model), corem=modelCore(item.model);
  const name=norm(item.name), maker=norm(item.maker);
  let score=0, reason=[];
  const related = threeCharRelated(q,item);
  if(!nq) return null;
  if(m===nq) {score=1000; reason.push("完全一致");}
  if(cm===cq) {score=Math.max(score,950); reason.push("ハイフン無視一致");}
  if(corem===coreq && coreq.length>=4) {score=Math.max(score,900); reason.push("型式本体一致");}
  if(related) {score=Math.max(score,820); reason.push("型式3文字以上一致：" + related);}
  if(cm.includes(cq) && cq.length>=3) {score=Math.max(score,700+cq.length); reason.push("型式部分一致");}
  if(corem.includes(coreq) && coreq.length>=3) {score=Math.max(score,650+coreq.length); reason.push("型式本体部分一致");}
  if(name.includes(nq) && nq.length>=2) {score=Math.max(score,500+nq.length); reason.push("通称名一致");}
  if(maker.includes(nq) && nq.length>=2) {score=Math.max(score,400+nq.length); reason.push("メーカー一致");}
  if(score===0 && cq.length>=6 && Math.abs(cq.length-cm.length)<=2){
    const d=levenshtein(cq,cm);
    if(d<=2) {score=250-d; reason.push("近似一致");}
  }
  return score>0 ? {item, score, related, reason:[...new Set(reason)].join(" / ")} : null;
}
function scoreName(q, item){
  const nq=norm(q), kq=kata(q);
  const maker=norm(item.maker), name=norm(item.name), type=norm(item.type);
  const kmaker=kata(item.maker), kname=kata(item.name);
  const model=norm(item.model), cmodel=compact(item.model);
  let score=0, reason=[];
  if(!nq) return null;
  if(name===nq || kname===kq) {score=1000; reason.push("通称名完全一致");}
  if(name.includes(nq) || kname.includes(kq)) {score=Math.max(score,850+nq.length); reason.push("通称名一致");}
  if(maker.includes(nq) || kmaker.includes(kq)) {score=Math.max(score,650+nq.length); reason.push("車名一致");}
  if((maker+name).includes(nq) || (kmaker+kname).includes(kq)) {score=Math.max(score,600+nq.length); reason.push("車名＋通称名一致");}
  if(model.includes(nq) || cmodel.includes(compact(q))) {score=Math.max(score,500+nq.length); reason.push("型式一致");}
  if(type.includes(nq)) {score=Math.max(score,300+nq.length); reason.push("種別一致");}
  return score>0 ? {item, score, reason:[...new Set(reason)].join(" / ")} : null;
}
function findModelCandidates(q, limit=5){
  return DB.map(x=>scoreModel(q,x)).filter(Boolean).sort((a,b)=>b.score-a.score || norm(a.item.model).localeCompare(norm(b.item.model))).slice(0,limit);
}
function findNameCandidates(q, limit=20){
  return DB.map(x=>scoreName(q,x)).filter(Boolean).sort((a,b)=>b.score-a.score || norm(a.item.name).localeCompare(norm(b.item.name))).slice(0,limit);
}

function candidateHtml(c, showReason=true) {

function maybeCard(q, candidates) {
  const related = candidates.filter(c=>c.related).slice(0,5);
  const list = related.map(c => candidateHtml(c)).join("");
  return `<div class="card">
    <div class="resultTitle maybe">🟡 OBD検査対象車の可能性があります</div>

    </div>

function noCard(q, candidates) {
  let extras = "";
  if(candidates.length){
    extras = `<div style="margin-top:12px;font-weight:800;">参考候補</div>` + candidates.slice(0,3).map(c => candidateHtml(c)).join("");
  }
  return `<div class="card">

    <div class="box danger">
      <div class="small">入力</div>
      <div style="font-size:20px;font-weight:900;word-break:break-all;">${norm(q)}</div>
      <p class="small">この内蔵DBでは完全一致がありません。</p>
    </div>
    ${extras}
  </div>`;
}
function nameResultCard(q, candidates) {
  if(!candidates.length) {
    return `<div class="card">
      <div class="resultTitle ng">🔴 該当する車名が見つかりません</div>
      <div class="box danger">
        <div class="small">入力</div>
        <div style="font-size:20px;font-weight:900;word-break:break-all;">${norm(q)}</div>
      </div>
    </div>`;
  }
  const grouped = [];
  const seen = new Set();
  for(const c of candidates) {
    const key = c.item.model;
    if(seen.has(key)) continue;
    seen.add(key);
    grouped.push(c);
    if(grouped.length >= 12) break;
  }
  return `<div class="card">
    <div class="resultTitle ok">🔎 車名検索結果</div>
    <div class="box notice">
      <b>${grouped.length}件の候補があります。</b>
      <div class="small">型式をタップすると、その型式でOBD判定します。</div>
    </div>
    ${grouped.map(c=>candidateHtml(c)).join("")}
  </div>`;
}
function checkModel(q){
  const nq = norm(q);
  if(!nq) return `<div class="card"><div class="resultTitle warn">型式を入力してください</div></div>`;
  const exact = DB.find(x => norm(x.model) === nq || compact(x.model) === compact(q));
  if(exact) return exactCard(exact);
  const candidates = findModelCandidates(q, 5);
  if(candidates.some(c=>c.related)) return maybeCard(q, candidates);
  return noCard(q, candidates);
}
function checkName(q){
  const nq = norm(q);
  if(!nq) return `<div class="card"><div class="resultTitle warn">車名を入力してください</div></div>`;
  return nameResultCard(q, findNameCandidates(q, 30));
}

}

  if(e.key === "Enter") runSearch();
});
